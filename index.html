<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breast Cancer Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <div class="prediction-box">

        <h1>Breast Cancer Prediction System</h1>

        <form action="/predict" method="POST">
            <div class="row">

                <div class="col-md-6 mb-3">
                    <label>Clump Thickness</label>
                    <input type="number" class="form-control" name="Clump_Thickness" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Uniformity of Cell Size</label>
                    <input type="number" class="form-control" name="Uniformity_Cell_Size" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Uniformity of Cell Shape</label>
                    <input type="number" class="form-control" name="Uniformity_Cell_Shape" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Marginal Adhesion</label>
                    <input type="number" class="form-control" name="Marginal_Adhesion" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Single Epithelial Cell Size</label>
                    <input type="number" class="form-control" name="Single_Epithelial_Cell_Size" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Bare Nuclei</label>
                    <input type="number" class="form-control" name="Bare_Nuclei" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Bland Chromatin</label>
                    <input type="number" class="form-control" name="Bland_Chromatin" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Normal Nucleoli</label>
                    <input type="number" class="form-control" name="Normal_Nucleoli" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Mitoses</label>
                    <input type="number" class="form-control" name="Mitoses" required>
                </div>

            </div>

            <button type="submit" class="btn btn-primary w-100">
                Predict
            </button>
        </form>

        {% if result %}
        <div class="result">
            <h3>Prediction Result</h3>
            <p>{{ result }}</p>
        </div>
        {% endif %}

    </div>
</div>

</body>
</html>
